<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analista AI Pro | Gestão & Palpites Esportivos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
    body { 
      background: linear-gradient(135deg, #0b132b 0%, #1c2541 100%);
      color: #f8fafc; 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh;
    }
    .card-glass { 
      background: rgba(30, 41, 59, 0.75); 
      backdrop-filter: blur(16px); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    }
    .accent-gradient {
      background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
    }
  </style>
</head>
<body class="pb-16">

  <!-- Header Topo -->
  <header class="border-b border-slate-700/50 bg-slate-900/90 sticky top-0 z-50 backdrop-blur-md px-4 py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="accent-gradient p-2.5 rounded-xl text-slate-950 font-black shadow-lg shadow-amber-500/20">
          <i class="fa-solid fa-chart-line text-xl"></i>
        </div>
        <div>
          <h1 class="font-extrabold text-xl tracking-tight leading-tight text-white">Analista AI <span class="text-amber-400">Pro</span></h1>
          <p class="text-xs text-slate-400 font-medium">Análises de Precisão & Gestão de Stake</p>
        </div>
      </div>
      <div>
        <span class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1.5 rounded-full border border-emerald-500/30 font-bold">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>
          Jogos de Hoje
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 mt-6">
    
    <!-- CALCULADORA DE BANCA -->
    <div class="card-glass p-6 rounded-2xl mb-8 border-amber-500/30">
      <div class="flex items-center gap-2 mb-4">
        <i class="fa-solid fa-calculator text-amber-400 text-lg"></i>
        <h2 class="text-base font-bold text-white uppercase tracking-wider">Calculadora Inteligente de Stake</h2>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Sua Banca Atual (R$)</label>
          <input type="number" id="input-banca" value="500" class="w-full bg-slate-950/80 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-bold text-lg focus:outline-none focus:border-amber-400 transition" oninput="recalcularStakes()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Sua Meta do Dia (R$)</label>
          <input type="number" id="input-meta" value="1000" class="w-full bg-slate-950/80 border border-slate-700 rounded-xl px-4 py-2.5 text-amber-400 font-bold text-lg focus:outline-none focus:border-amber-400 transition" oninput="recalcularStakes()">
        </div>
        <div class="flex flex-col justify-center bg-slate-950/50 p-4 rounded-xl border border-slate-800">
          <span class="text-xs text-slate-400 font-medium">Meta de Lucro</span>
          <span id="label-lucro" class="text-2xl font-black text-emerald-400">R$ 500,00</span>
        </div>
      </div>
    </div>

    <!-- Título Seção -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-black text-white flex items-center gap-2">
        <i class="fa-solid fa-fire text-amber-500 animate-bounce"></i>
        Análises da Rodada
      </h2>
    </div>

    <!-- Container dos Jogos -->
    <div id="jogos-container" class="grid grid-cols-1 gap-6">
      <div class="text-center py-12 text-slate-400 card-glass rounded-2xl">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-amber-400 mb-3"></i>
        <p>Buscando os palpites de hoje...</p>
      </div>
    </div>
  </main>

  <script>
    let jogosGlobais = [];

    async function carregarAnalises() {
      const container = document.getElementById('jogos-container');
      try {
        const res = await fetch('dados_jogos_hoje.json?v=' + Date.now());
        if (!res.ok) throw new Error();
        jogosGlobais = await res.json();
        
        if (!jogosGlobais || jogosGlobais.length === 0) {
          container.innerHTML = `<div class="card-glass p-8 rounded-2xl text-center text-slate-400">Aguardando atualizações do robô.</div>`;
          return;
        }
        renderizarJogos();
      } catch (e) {
        container.innerHTML = `
          <div class="card-glass p-8 rounded-2xl text-center">
            <i class="fa-solid fa-clock text-amber-400 text-3xl mb-3"></i>
            <p class="text-slate-200 font-bold">O robô está processando as análises de hoje.</p>
            <p class="text-xs text-slate-400 mt-1">Atualize a página em instantes.</p>
          </div>
        `;
      }
    }

    function recalcularStakes() {
      const banca = parseFloat(document.getElementById('input-banca').value) || 0;
      const meta = parseFloat(document.getElementById('input-meta').value) || 0;
      const lucro = meta - banca;
      document.getElementById('label-lucro').innerText = 'R$ ' + (lucro > 0 ? lucro : 0).toFixed(2);
      renderizarJogos();
    }

    function renderizarJogos() {
      const container = document.getElementById('jogos-container');
      const banca = parseFloat(document.getElementById('input-banca').value) || 500;
      container.innerHTML = '';

      jogosGlobais.forEach((j) => {
        let percentual = j.nivel_confianca === 'Alta' ? 0.10 : 0.05;
        let stakeCalculada = (banca * percentual).toFixed(2);

        const cardHtml = `
          <div class="card-glass rounded-2xl p-6 hover:border-amber-500/40 transition duration-300">
            <div class="flex flex-wrap justify-between items-start gap-2 border-b border-slate-700/60 pb-4 mb-4">
              <div>
                <span class="text-[10px] font-black text-amber-400 uppercase tracking-widest bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                  ${j.liga || 'Futebol'}
                </span>
                <h3 class="text-xl font-black text-white mt-2">${j.jogo}</h3>
              </div>
              <div class="text-right">
                <span class="text-xs text-slate-400 block font-medium">Confiança</span>
                <span class="text-sm font-black text-emerald-400">${j.nivel_confianca || 'Alta'}</span>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-300 mb-5">
              <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800">
                <p class="font-bold text-amber-400 mb-1 text-xs uppercase tracking-wider flex items-center gap-1.5">
                  <i class="fa-solid fa-cloud-sun-rain"></i> Clima & Gramado
                </p>
                <p class="text-xs text-slate-300 leading-relaxed">${j.clima_e_gramado}</p>
              </div>
              
              <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800">
                <p class="font-bold text-amber-400 mb-1 text-xs uppercase tracking-wider flex items-center gap-1.5">
                  <i class="fa-solid fa-users-slash"></i> Desfalques & Tática
                </p>
                <p class="text-xs text-slate-300 leading-relaxed">${j.desfalques_e_escalacao}</p>
              </div>
            </div>

            <div class="bg-slate-950/30 p-4 rounded-xl border border-slate-800/80 mb-5">
              <p class="text-xs font-bold text-slate-300 mb-1 flex items-center gap-1.5">
                <i class="fa-solid fa-robot text-amber-400"></i> Parecer do Analista AI:
              </p>
              <p class="text-xs text-slate-400 leading-relaxed">${j.resumo_analise}</p>
            </div>

            <div class="bg-gradient-to-r from-slate-900 to-slate-950 border border-amber-500/40 rounded-xl p-4 flex flex-wrap justify-between items-center gap-4">
              <div>
                <span class="text-[10px] text-amber-400 font-bold block uppercase tracking-wider">Palpite Recomendado</span>
                <span class="text-lg font-black text-white">${j.palpite_recomendado}</span>
              </div>
              <div class="flex items-center gap-4">
                <div class="text-right">
                  <span class="text-[10px] text-slate-400 block font-medium">Odd Est.</span>
                  <span class="text-base font-black text-amber-400">${j.odd_estimada || '1.80'}</span>
                </div>
                <div class="text-right border-l border-slate-800 pl-4">
                  <span class="text-[10px] text-slate-400 block font-medium">Entrada Sugerida</span>
                  <span class="text-base font-black text-emerald-400">R$ ${stakeCalculada}</span>
                </div>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    }

    carregarAnalises();
  </script>
</body>
</html>
