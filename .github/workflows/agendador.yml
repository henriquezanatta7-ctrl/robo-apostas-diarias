name: Executar Robo de Analises Diarias

on:
  schedule:
    # Roda automaticamente todos os dias às 07:00 da manhã (horário de Brasília = 10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite que você clique em um botão para rodar manualmente quando quiser!

jobs:
  executar-robo:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar Código do Repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Robô de Análise
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: python main.py
|
        python main.py

    - name: Salvar Dados Atualizados no GitHub
      run: |
        git config --global user.name "Robo-Apostas-Bot"
        git config --global user.email "bot@seu-site.com"
        git add dados_jogos_hoje.json
        git commit -m "Auto: Atualizacao diaria das analises [skip ci]" || exit 0
        git push
